name: Generate Keymap SVG

on:
  push:
    paths:
      - '**.keymap'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draw:
    runs-on: ubuntu-latest

    steps:
      - name: Debug file tree
        run: |
          echo "=== ROOT ==="
          ls -R
      - name: Install tools
        run: |
          pip install keymap-drawer
          sudo apt-get update
          sudo apt-get install -y jq yq

      - name: Convert keymap
        run: |
          keymap parse -z config/roBa.keymap > keymap.yaml

      - name: Convert layout
        run: |
          jq '{layout: {keys: .layouts.default_layout.layout}}' config/roBa.json > layout.yaml

      - name: Merge
        run: |
          yq eval-all 'select(fileIndex==0) * select(fileIndex==1)' keymap.yaml layout.yaml > combined.yaml

      - name: Draw
        run: |
          keymap draw combined.yaml > keymap.svg
