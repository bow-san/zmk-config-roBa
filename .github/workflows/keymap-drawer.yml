name: Generate Keymap SVG

on:
  push:
    paths:
      - '**.keymap'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          pip install keymap-drawer
          sudo apt-get update
          sudo apt-get install -y jq yq

      - name: Debug roBa.json
        run: |
          cat config/roBa.json | jq '.layouts.default_layout.layout[0]'

      - name: Convert keymap
        run: |
          keymap parse -z config/roBa.keymap > keymap.yaml


      - name: Convert YAML to JSON
        run: |
          python3 <<EOF
          import yaml, json

          with open("keymap.yaml") as f:
            data = yaml.safe_load(f)

          # layout削除
          data.pop("layout", None)

          with open("keymap_clean.json", "w") as f:
            json.dump(data, f)
          EOF

      - name: Convert layout（最終正解）
        run: |
          jq '{layout: {keys: .layouts.default_layout.layout}}' config/roBa.json > layout.json

      - name: Debug files
        run: |
          echo "=== keymap_clean.json ==="
          cat keymap_clean.json || true
          echo "=== layout.json ==="
          cat layout.json || true

      - name: Merge (Python)
        run: |
          python <<EOF
          import json

          with open("keymap_clean.json") as f:
            keymap = json.load(f)

          with open("layout.json") as f:
            layout = json.load(f)

          # ★ここが重要
          keymap["layout"] = {
            "custom": layout["layout"]["keys"]
          }

          with open("combined.json", "w") as f:
            json.dump(keymap, f)
          EOF

      - name: Debug combined.json
        run: cat combined.json

      - name: Convert to YAML
        run: |
          pip install pyyaml
          python <<EOF
          import json, yaml
          with open("combined.json") as f:
            data = json.load(f)
          with open("combined.yaml", "w") as f:
            yaml.safe_dump(data, f)
          EOF

      - name: Debug combined.yaml
        run: cat combined.yaml

      - name: Draw
        run: |
          keymap draw combined.yaml > keymap.svg
